volumes:
 n8n_storage:
 postgres_storage:
 ollama_storage:
 qdrant_storage:
 redis_storage:
 minio_storage:
 baserow_storage:

networks:
 demo:

x-n8n: &service-n8n
 image: n8nio/n8n:1.86.0
 networks: ['demo']
 user: root
 environment:
   - DB_TYPE=postgresdb
   - DB_POSTGRESDB_HOST=postgres
   - DB_POSTGRESDB_USER=${POSTGRES_USER}
   - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
   - N8N_DIAGNOSTICS_ENABLED=false
   - N8N_PERSONALIZATION_ENABLED=false
   - N8N_ENCRYPTION_KEY
   - N8N_USER_MANAGEMENT_JWT_SECRET
   - QUEUE_BULL_REDIS_HOST=redis
   - QUEUE_BULL_REDIS_PORT=6379
   - QUEUE_BULL_REDIS_PASSWORD=${REDIS_PASSWORD}
   - PYTHONPATH=/opt/venv/lib/python3.11/site-packages:${PYTHONPATH:-}
   - PATH=/opt/venv/bin:$PATH
 links:
   - postgres
   - redis
 entrypoint: >
   /bin/sh -c "
   apk add --update python3 py3-pip gcc python3-dev musl-dev curl ffmpeg &&
   python3 -m venv /opt/venv &&
   . /opt/venv/bin/activate &&
   pip install yt-dlp &&
   chown -R node:node /opt/venv &&
   su node -c 'n8n start'"

x-ollama: &service-ollama
 image: ollama/ollama:latest
 container_name: ollama
 networks: ['demo']
 restart: unless-stopped
 ports:
   - 11434:11434
 volumes:
   - ollama_storage:/root/.ollama

x-init-ollama: &init-ollama
 image: ollama/ollama:latest
 networks: ['demo']
 container_name: ollama-pull-llama
 volumes:
   - ollama_storage:/root/.ollama
 entrypoint: /bin/sh
 command:
   - "-c"
   - "sleep 3; OLLAMA_HOST=ollama:11434 ollama pull llama3.2"

services:
 postgres:
   image: pgvector/pgvector:pg16
   networks: ['demo']
   restart: unless-stopped
   ports:
     - "5432:5432"
   environment:
     - POSTGRES_USER
     - POSTGRES_PASSWORD
     - POSTGRES_DB
   command: [
     "postgres",
     "-c", "maintenance_work_mem=128MB",
     "-c", "effective_cache_size=512MB",
     "-c", "shared_buffers=256MB",
     "-c", "max_connections=500"
   ]
   volumes:
     - postgres_storage:/var/lib/postgresql/data
   healthcheck:
     test: ['CMD-SHELL', 'pg_isready -h localhost -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
     interval: 5s
     timeout: 5s
     retries: 10

 redis:
   image: redis:alpine
   container_name: redis
   networks: ['demo']
   restart: unless-stopped
   ports:
     - "6379:6379"
   command: redis-server --requirepass ${REDIS_PASSWORD}
   volumes:
     - redis_storage:/data
   healthcheck:
     test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
     interval: 5s
     timeout: 5s
     retries: 10

 n8n-import:
   <<: *service-n8n
   container_name: n8n-import
   entrypoint: /bin/sh
   command:
     - "-c"
     - "apk add --update python3 py3-pip gcc python3-dev musl-dev curl ffmpeg && python3 --version && ffmpeg -version && n8n import:credentials --separate --input=/backup/credentials && n8n import:workflow --separate --input=/backup/workflows"
   volumes:
     - ./n8n/backup:/backup
   depends_on:
     postgres:
       condition: service_healthy
     redis:
       condition: service_healthy

 n8n:
   <<: *service-n8n
   container_name: n8n
   restart: unless-stopped
   ports:
     - 5678:5678
   volumes:
     - n8n_storage:/home/node/.n8n
     - ./n8n/backup:/backup
     - ./shared:/data/shared
   depends_on:
     postgres:
       condition: service_healthy
     redis:
       condition: service_healthy
     n8n-import:
       condition: service_completed_successfully

 qdrant:
   image: qdrant/qdrant
   container_name: qdrant
   networks: ['demo']
   restart: unless-stopped
   ports:
     - 6333:6333
   volumes:
     - qdrant_storage:/qdrant/storage

 cloudflared:
   image: cloudflare/cloudflared:latest
   container_name: cloudflared
   networks: ['demo']
   restart: unless-stopped
   command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
   environment:
     - TUNNEL_URL=http://n8n:5678
   depends_on:
     n8n:
       condition: service_started
   healthcheck:
     test: ["CMD", "cloudflared", "--version"]
     interval: 10s
     timeout: 5s
     retries: 5

 ollama-cpu:
   profiles: ["cpu"]
   <<: *service-ollama

 ollama-gpu:
   profiles: ["gpu-nvidia"]
   <<: *service-ollama
   deploy:
     resources:
       reservations:
         devices:
           - driver: nvidia
             count: 1
             capabilities: [gpu]

 ollama-pull-llama-cpu:
   profiles: ["cpu"]
   <<: *init-ollama
   depends_on:
     - ollama-cpu

 ollama-pull-llama-gpu:
   profiles: ["gpu-nvidia"]
   <<: *init-ollama
   depends_on:
     - ollama-gpu

 minio:
   image: minio/minio
   container_name: minio
   networks: ['demo']
   restart: unless-stopped
   ports:
     - "9000:9000"
     - "9001:9001"
   environment:
     - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
     - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
   volumes:
     - minio_storage:/data
   command: server --console-address ":9001" /data
   healthcheck:
     test: ["CMD", "mc", "ready", "local"]
     interval: 5s
     timeout: 5s
     retries: 5

 baserow:
   image: baserow/baserow:1.21.2
   container_name: baserow
   networks: ['demo']
   restart: unless-stopped
   environment:
     - BASEROW_PUBLIC_URL=http://localhost:8080
     - DATABASE_HOST=postgres
     - DATABASE_NAME=${POSTGRES_DB}
     - DATABASE_USER=${POSTGRES_USER}
     - DATABASE_PASSWORD=${POSTGRES_PASSWORD}
     - REDIS_HOST=redis
     - REDIS_PORT=6379
     - REDIS_PASSWORD=${REDIS_PASSWORD}
   ports:
     - "8080:80"
   volumes:
     - baserow_storage:/baserow/data
   depends_on:
     postgres:
       condition: service_healthy
     redis:
       condition: service_healthy